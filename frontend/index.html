<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eu te amo ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    font-family:Arial;
    overflow:hidden;
}

.card{
    background:#222;
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:320px;
    box-shadow:0 0 20px #ff4da6;
}

img{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;
}

h1{
    color:#ff4da6;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
    margin-top:15px;
}

#msg{
    display:none;
    margin-top:15px;
    color:#ffd1e8;
}
</style>
</head>

<body>

<div class="card">

<img src="foto.jpg">

<h1>Eu te amo ❤️</h1>

<p>
Você é meu bug favorito:
aparece do nada e domina todo meu sistema.
</p>

<button onclick="mostrar()">
Clique aqui 💌
</button>

<p id="msg">
Obrigado por fazer minha vida mais bonita.
</p>

</div>

<script>
function mostrar(){
    document.getElementById('msg').style.display='block';
}
</script>

</body>
</html>
